# Server
server.port=8080
server.servlet.context-path=/

# DataSource (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/operator_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL Init (schema.sql runs on startup instead of Flyway)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Photo Storage Path
app.photo.upload-dir=uploads/photos

# JWT (Base64)
app.jwt.secret=Q05zZ3hKMEo0bm1nS0ZrQjZ5ZVdmbTQ2a1F0NnR3UVp6Q2ZVd2VVM2Fqdw==
app.jwt.expiration-ms=86400000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.operator=DEBUG
logging.level.org.springframework.security=INFO
