<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Абоненты О! — Панель управления</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
    <header class="app-header">
        <div class="logo">
            <span class="logo-mark">O!</span>
            <span class="logo-text">Абоненты</span>
        </div>
        <div class="header-right">
            <span class="env-badge">Backend: <code>/api</code></span>
            <button id="logout-btn" class="ghost hidden">Выйти</button>
        </div>
    </header>

    <main class="app-main">
        <section class="card card-form" id="auth-card">
            <div class="card-header">
                <h2>Аутентификация</h2>
                <div class="card-actions">
                    <button id="tab-login" class="ghost">Войти</button>
                    <button id="tab-register" class="ghost">Регистрация</button>
                </div>
            </div>

            <form id="login-form" autocomplete="off">
                <div class="form-row">
                    <label for="login-username">Username</label>
                    <input id="login-username" name="username" type="text" placeholder="admin" required>
                </div>
                <div class="form-row">
                    <label for="login-password">Password</label>
                    <input id="login-password" name="password" type="password" placeholder="••••••••" required>
                </div>
                <div class="form-actions">
                    <button type="submit">Войти</button>
                </div>
            </form>

            <form id="register-form" class="hidden" autocomplete="off">
                <div class="form-row">
                    <label for="reg-username">Username</label>
                    <input id="reg-username" name="username" type="text" placeholder="user123" required>
                </div>
                <div class="form-row">
                    <label for="reg-email">Email</label>
                    <input id="reg-email" name="email" type="email" placeholder="user@example.com" required>
                </div>
                <div class="form-row">
                    <label for="reg-password">Password</label>
                    <input id="reg-password" name="password" type="password" placeholder="минимум 6 символов" required>
                </div>
                <div class="form-actions">
                    <button type="submit">Создать аккаунт</button>
                </div>
            </form>

            <div id="auth-errors" class="alert alert-error hidden"></div>
            <div id="auth-success" class="alert alert-success hidden"></div>
            <div id="token-box" class="token-box hidden">
                <div class="token-title">JWT</div>
                <code id="token-value" class="token-value"></code>
            </div>
        </section>

        <section class="card card-form">
            <h2>Создать нового абонента</h2>
            <form id="subscriber-form" autocomplete="off">
                <div class="form-row">
                    <label for="msisdn">Номер (MSISDN)</label>
                    <input id="msisdn" name="msisdn" type="text" placeholder="996700123456" required>
                    <small class="hint">Пример: 996700123456</small>
                </div>
                <div class="form-row">
                    <label for="firstName">Имя</label>
                    <input id="firstName" name="firstName" type="text" placeholder="Иван" required>
                </div>
                <div class="form-row">
                    <label for="lastName">Фамилия</label>
                    <input id="lastName" name="lastName" type="text" placeholder="Иванов" required>
                </div>
                <div class="form-row">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="ivan@example.com">
                </div>
                <div class="form-row">
                    <label for="status">Статус</label>
                    <select id="status" name="status" required>
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="BLOCKED">BLOCKED</option>
                        <option value="SUSPENDED">SUSPENDED</option>
                        <option value="TERMINATED">TERMINATED</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="balance">Баланс (сом)</label>
                    <input id="balance" name="balance" type="number" step="0.01" min="0" value="0.00" required>
                </div>
                <div class="form-actions">
                    <button type="submit">Создать абонента</button>
                    <button type="button" class="secondary" id="reset-form">Очистить</button>
                </div>
            </form>
            <div id="form-errors" class="alert alert-error hidden"></div>
            <div id="form-success" class="alert alert-success hidden"></div>
        </section>

        <section class="card card-table">
            <div class="card-header">
                <h2>Список абонентов</h2>
                <div class="card-actions">
                    <button id="refresh-list" class="ghost">Обновить</button>
                </div>
            </div>
            <div id="table-wrapper" class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>MSISDN</th>
                        <th>ФИО</th>
                        <th>Статус</th>
                        <th>Баланс</th>
                        <th>Тариф</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody id="subscriber-table-body">
                    <tr>
                        <td colspan="7" class="placeholder">Загрузка списка абонентов...</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div id="table-message" class="table-message"></div>
        </section>
    </main>

    <footer class="app-footer">
        <span>О! Mobile Operator — демо сервис абонентов</span>
        <span>Frontend: <code>resources/static/index.html</code></span>
    </footer>
</div>

<script src="app.js"></script>
</body>
</html>
